name = "r2-explorer"
main = "entry.mjs"
compatibility_date = "2024-11-06"
assets = { directory = "dashboard", binding = "ASSETS", html_handling = "auto-trailing-slash", not_found_handling = "single-page-application", run_worker_first = ["/api/*", "/share/*"] }
workers_dev = true

[[r2_buckets]]
binding = "zyzy-1"
bucket_name = "zyzy-1"
